spring.application.name=demo
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=testdb;encrypt=false
spring.datasource.username=sa
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.demo.entity

# ========== Zhipu GLM (default) ==========
ai.api.url=https://open.bigmodel.cn/api/paas/v4/chat/completions
ai.api.key=${GLM_API_KEY:a9d13a500c674d05a946e1c33324f96e.Uv4W7lDbQvTd9Abi}
ai.api.model=glm-4-air

# ========== OpenAI (GPT) - set API Key to enable ==========
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-4o

# ========== Anthropic (Claude) - set API Key to enable ==========
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.version=2023-06-01
anthropic.model=claude-sonnet-4-20250514

# ========== DeepSeek - set API Key to enable ==========
deepseek.api.key=${DEEPSEEK_API_KEY:sk-396d1a2725334fdebdf7a8f671ed5cca}
deepseek.model=deepseek-chat

# ========== Alibaba Qwen - set API Key to enable ==========
qwen.api.key=${QWEN_API_KEY:sk-20ae01bdb2904055825f00585fc68734}
qwen.model=qwen-plus

# ========== LLM Router ==========
llm.default-provider=glm

# ========== JWT Auth ==========
jwt.secret=${JWT_SECRET:my-secret-key-my-secret-key-min-32-chars-long!!}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ========== CORS ==========
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
